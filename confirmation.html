<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前日確認テンプレート作成</title>
    <link rel="stylesheet" href="css/create_template_form.css">
    <script src="js/common.js" defer></script>
    <script src="js/confirmation.js" defer></script>
</head>
<body>
    <main class="page-shell">
        <section class="form-card">
            <p class="eyebrow">Confirmation Template</p>
            <h1>前日確認作成</h1>
            <p class="lead">日程と場所を入力すると、共有用のテンプレートをすぐに作成できます。</p>

            <form class="template-form">
                <label class="field-row">
                    <span>試合日時</span>
                    <input type="date" id="date">
                </label>

                <div class="time-grid">
                    <label class="field-row">
                        <span>第1試合開始時刻</span>
                        <input type="time" id="startTime">
                    </label>
                    <label class="field-row">
                        <span>第1試合終了時刻</span>
                        <input type="time" id="firstGameEndTime">
                    </label>
                    <label class="field-row full-width">
                        <span>第2試合終了時刻</span>
                        <input type="time" id="secondGameEndTime">
                    </label>
                </div>

                <fieldset class="place-section">
                    <legend>グラウンド</legend>
                    <div class="radio-grid">
                        <label class="choice-chip"><input type="radio" name="place" value="多摩川緑地野球場" checked><span>多摩川緑地</span></label>
                        <label class="choice-chip"><input type="radio" name="place" value="多摩川六郷橋緑地"><span>六郷橋緑地</span></label>
                        <label class="choice-chip"><input type="radio" name="place" value="多摩川ガス橋緑地野球場"><span>ガス橋緑地</span></label>
                        <label class="choice-chip"><input type="radio" name="place" value="砧野球場（東名高速下）"><span>砧野球場</span></label>
                        <label class="choice-chip"><input type="radio" name="place" value="碑文谷公園"><span>碑文谷公園</span></label>
                                <label class="choice-chip"><input type="radio" value="猿江恩賜公園野球場"><span>猿江恩賜公園野球場</span></label>                                
                        <label class="choice-chip"><input type="radio" name="place" value="その他"><span>その他</span></label>
                    </div>
                    <div class="custom-place-grid is-hidden" id="customPlaceGrid" aria-hidden="true">
                        <label class="field-row">
                            <span>場所</span>
                            <input type="text" id="customPlace" placeholder="場所名を入力" disabled>
                        </label>
                        <label class="field-row">
                            <span>URL</span>
                            <input type="text" id="customPlaceURL" placeholder="場所のURLを入力" disabled>
                        </label>
                    </div>
                    <label class="field-row">
                        <span>グラウンドの号面</span>
                        <input type="text" id="groundNumber" placeholder="号面を入力">
                    </label>
                </fieldset>

                <button class="primary-action" type="button" onClick="createTemplate()">テンプレートを作成</button>
            </form>

            <section class="result-card" aria-live="polite">
                <p class="result-label">生成結果</p>
                <p id="result"></p>
            </section>
        </section>
    </main>
    

    <script src="js/firebase/authpage.js" type="module"></script>
</body>
</html>

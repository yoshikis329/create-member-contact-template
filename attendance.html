<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>出欠確認テンプレート作成</title>
    <link rel="stylesheet" href="css/attendance.css">
    <script src="js/common_script.js" defer></script>
    <script src="js/attendance_script.js" defer></script>
</head>
<body>
    <h1>出欠確認作成</h1>
    <form>
        <p>日時：<input type="date" id="date"></p>
        <p>1試合目開始時刻：<input type="time" id="startTime"></p>
        <p>1試合目終了時刻：<input type="time" id="firstGameEndTime"></p>
        <p>2試合目終了時刻（ダブルヘッダーのみ）：<input type="time" id="secondGameEndTime"></p>

        <fieldset>
            <legend>場所：</legend>
            <label><input type="radio" name="place" value="多摩川緑地野球場" checked>多摩川緑地</label>
            <label><input type="radio" name="place" value="多摩川六郷橋緑地">六郷橋緑地</label>
            <label><input type="radio" name="place" value="多摩川ガス橋緑地野球場">ガス橋緑地</label>
            <label><input type="radio" name="place" value="砧野球場（東名高速下）">砧野球場</label>
            <label><input type="radio" name="place" value="碑文谷公園">碑文谷公園</label>
            <label><input type="radio" name="place" value="その他">その他</label>
            <input type="text" id="customPlace" placeholder="その他の場所を入力">
            <input type="text" id="customPlaceURL" placeholder="その他の場所のURLを入力">
        </fieldset>

        <p>グラウンドの号面：<input type="text" id="groundNumber" placeholder="号面を入力"></p>
        <p>期日：<input type="date" id="expireDate"></p>
        <button type="button" onClick="createTemplate()">作成</button>
    </form>
    <p id="result"> </p>
    

    <script src="js/firebase/common.js" type="module"></script>
    <script src="js/firebase/authpage.js" type="module"></script>
</body>
</html>

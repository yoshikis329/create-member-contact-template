<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン認証付きページ</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        .hidden { display: none; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h2>Login</h2>
        <input type="text" id="id" placeholder="ID">
        <input type="password" id="password" placeholder="パスワード">
        <button id="login-btn">ログイン</button>
        <p id="error-msg" style="color: red;"></p>
    </div>

    <div id="content-section" class="container hidden">
        <h2>テンプレート作成</h2>
        <ul>
            <li href="attendance.html">出欠確認</li>
            <li href="confirmation.html">前日確認</li>
            <li href="schedule.html">予定共有</li>
        </ul>
        <button id="logout-btn">ログアウト</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // TODO: Firebaseコンソールからコピーした自分の設定に置き換えてください
        const firebaseConfig = {
            apiKey: "AIzaSyBHt3387MtvVeZxRhSVh0Ra8hXsWEekdYE",
            authDomain: "create-template-login.firebaseapp.com",
            projectId: "create-template-login",
            storageBucket: "create-template-login.firebasestorage.app",
            messagingSenderId: "546602104432",
            appId: "1:546602104432:web:5ca1d4a532e235880e26b5",
            measurementId: "G-FEM7PCZ9HN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ログイン状態の監視
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('content-section').classList.remove('hidden');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('content-section').classList.add('hidden');
            }
        });

        // ログイン処理
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('id').value + '@example.com';
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                document.getElementById('error-msg').innerText = "ログイン失敗: " + error.message;
            }
        });

        // ログアウト処理
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });
    </script>
</body>
</html>
